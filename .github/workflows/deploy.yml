name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main

permissions:
  id-token: write # OIDC認証に必須
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::274197532052:role/Web-portofolio
          aws-region: ap-northeast-1

      - name: Sync to S3
        run: |
          aws s3 sync . s3://my-site-bucket-20260630/ --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "server/*" \
            --exclude "README.md"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E21SF5AR87L6SP \
            --paths "/*"
